name: Build APK & AAB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
          else
            keytool -genkeypair \
              -alias warehouse \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -keystore app/keystore.jks \
              -storepass Warehouse2024! \
              -keypass Warehouse2024! \
              -dname "CN=Joao Machado, OU=Dev, O=Joao Machado, L=Lisbon, ST=Lisbon, C=PT"
          fi

      - name: Build release APK
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'Warehouse2024!' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'warehouse' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'Warehouse2024!' }}
        run: ./gradlew assembleRelease

      - name: Build release AAB (Play Store)
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'Warehouse2024!' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'warehouse' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'Warehouse2024!' }}
        run: ./gradlew bundleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-manager-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload Release AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-manager-release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90
