name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias warehouse \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -keystore app/keystore.jks \
            -storepass warehouse2024 \
            -keypass warehouse2024 \
            -dname "CN=Warehouse Manager, OU=Dev, O=Joao, L=Lisbon, ST=Lisbon, C=PT"

      - name: Build release APK
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: warehouse2024
          KEY_ALIAS: warehouse
          KEY_PASSWORD: warehouse2024
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-manager-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-manager-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
